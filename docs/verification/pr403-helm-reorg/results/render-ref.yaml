# Source: rbgs/templates/manager/manager.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rbgs-controller-manager
  namespace: rbgs-system
  labels:
    control-plane: rbgs-controller
spec:
  replicas: 2
  selector:
    matchLabels:
      control-plane: rbgs-controller
  template:
    metadata:
      labels:
        control-plane: rbgs-controller
    spec:
      serviceAccountName: rbgs-controller-sa
      securityContext:
        {}
      containers:
        - name: rbgs
          args:
            - --metrics-bind-address=:8443
            - --leader-elect
            - --health-probe-bind-address=:8081
            - --max-concurrent-reconciles=10
            - --kube-api-qps=20
            - --kube-api-burst=30
            - --scheduler-name=scheduler-plugins
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          command:
            - /manager
          securityContext:
            {}
          image: "rolebasedgroup/rbgs-controller:v0.8.0-69fe55d"
          imagePullPolicy: IfNotPresent
          resources:
            limits:
              cpu: 1000m
              memory: 1536Mi
            requests:
              cpu: 100m
              memory: 256Mi
---
# Source: rbgs/templates/webhook/manifests.yaml
# ValidatingWebhookConfiguration for RoleBasedGroup admission validation.
#
# NOTE: caBundle is intentionally left empty here. It is patched at runtime by
# the in-cluster controller (WebhookCertReconciler) using the self-signed CA
# generated by pkg/webhook.CertManager. Do not pre-populate caBundle; it would
# be overwritten on the next reconcile cycle anyway.
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: rbgs-validating-webhook-configuration
  labels:
    control-plane: rbgs-controller
    app.kubernetes.io/name: rbgs
    app.kubernetes.io/managed-by: Helm
webhooks:
- name: vrolebasedgroup.kb.io
  admissionReviewVersions:
  - v1
  sideEffects: None
  failurePolicy: Fail
  clientConfig:
    service:
      name: rbgs-webhook-service
      namespace: rbgs-system
      path: /validate-workloads-x-k8s-io-v1alpha2-rolebasedgroup
  rules:
  - apiGroups:
    - workloads.x-k8s.io
    apiVersions:
    - v1alpha2
    operations:
    - CREATE
    - UPDATE
    resources:
    - rolebasedgroups
