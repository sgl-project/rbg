<svg viewBox="0 0 920 420" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #ffffff;">

<!-- Title -->
<text x="460" y="32" text-anchor="middle" fill="#1a1a2e" font-size="20" font-weight="500">Inplace Scheduling: Component Strategy</text>

<!-- ===== Step 1: Running State ===== -->
<text x="150" y="65" text-anchor="middle" fill="#7c3aed" font-size="13" font-weight="500">1. Running State</text>

<!-- Node A -->
<rect x="20" y="80" width="260" height="130" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1.5"/>
<text x="32" y="100" fill="#1a1a2e" font-size="12" font-weight="500">Node A</text>
<rect x="36" y="110" width="95" height="38" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
<text x="83" y="133" text-anchor="middle" fill="#2563eb" font-size="10">abc-Prefill-0 (v1)</text>
<rect x="36" y="158" width="228" height="24" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1" stroke-dasharray="3,2"/>
<text x="150" y="174" text-anchor="middle" fill="#16a34a" font-size="9">Model Weights Cache (140GB)</text>

<!-- Node B -->
<rect x="20" y="225" width="260" height="130" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1.5"/>
<text x="32" y="245" fill="#1a1a2e" font-size="12" font-weight="500">Node B</text>
<rect x="36" y="255" width="95" height="38" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
<text x="83" y="278" text-anchor="middle" fill="#2563eb" font-size="10">abc-Prefill-1 (v1)</text>
<rect x="36" y="303" width="228" height="24" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1" stroke-dasharray="3,2"/>
<text x="150" y="319" text-anchor="middle" fill="#16a34a" font-size="9">Model Weights Cache (140GB)</text>

<!-- Step 1 descriptions -->
<text x="150" y="372" text-anchor="middle" fill="#6b7280" font-size="10">Old Pods running on Node A &amp; B.</text>
<text x="150" y="386" text-anchor="middle" fill="#6b7280" font-size="10">Model weights cached locally.</text>

<!-- Arrow 1→2 -->
<defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#7c3aed"/></marker></defs>
<line x1="290" y1="220" x2="325" y2="220" stroke="#7c3aed" stroke-width="2" marker-end="url(#arr)"/>

<!-- ===== Step 2: Upgrade Triggered ===== -->
<text x="460" y="65" text-anchor="middle" fill="#7c3aed" font-size="13" font-weight="500">2. MaxSurge</text>

<!-- Node A -->
<rect x="335" y="80" width="260" height="130" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1.5"/>
<text x="347" y="100" fill="#1a1a2e" font-size="12" font-weight="500">Node A</text>
<rect x="349" y="110" width="85" height="38" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
<text x="391" y="133" text-anchor="middle" fill="#2563eb" font-size="10">abc-Prefill-0 (v1)</text>
<rect x="445" y="110" width="138" height="38" rx="4" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
<text x="514" y="127" text-anchor="middle" fill="#7c3aed" font-size="10" font-weight="500">def-prefill-0 (v2, surge)</text>
<text x="514" y="140" text-anchor="middle" fill="#7c3aed" font-size="8">prefers: {A, B}</text>
<rect x="349" y="158" width="228" height="24" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1" stroke-dasharray="3,2"/>
<text x="463" y="174" text-anchor="middle" fill="#16a34a" font-size="9">Model Weights Cache (140GB)</text>

<!-- Node B -->
<rect x="335" y="225" width="260" height="130" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1.5"/>
<text x="347" y="245" fill="#1a1a2e" font-size="12" font-weight="500">Node B</text>
<rect x="349" y="255" width="85" height="38" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
<text x="391" y="278" text-anchor="middle" fill="#2563eb" font-size="10">abc-Prefill-1 (v1)</text>
<rect x="445" y="255" width="138" height="38" rx="4" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
<text x="514" y="272" text-anchor="middle" fill="#7c3aed" font-size="10" font-weight="500">def-Prefill-1 (v2, surge)</text>
<text x="514" y="285" text-anchor="middle" fill="#7c3aed" font-size="8">prefers: {A, B}</text>
<rect x="349" y="303" width="228" height="24" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1" stroke-dasharray="3,2"/>
<text x="463" y="319" text-anchor="middle" fill="#16a34a" font-size="9">Model Weights Cache (140GB)</text>

<!-- Step 2 descriptions -->
<text x="460" y="372" text-anchor="middle" fill="#6b7280" font-size="10">MaxSurge creates new Pods.</text>
<text x="460" y="386" text-anchor="middle" fill="#6b7280" font-size="10">Surge Pods prefer nodes of the same component.</text>

<!-- Arrow 2→3 -->
<line x1="605" y1="220" x2="640" y2="220" stroke="#7c3aed" stroke-width="2" marker-end="url(#arr)"/>

<!-- ===== Step 3: Cache Reuse ===== -->
<text x="780" y="65" text-anchor="middle" fill="#7c3aed" font-size="13" font-weight="500">3. Cache Reuse</text>

<!-- Node A -->
<rect x="650" y="80" width="260" height="130" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1.5"/>
<text x="662" y="100" fill="#1a1a2e" font-size="12" font-weight="500">Node A</text>
<rect x="662" y="110" width="85" height="38" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
<text x="704" y="130" text-anchor="middle" fill="#94a3b8" font-size="9">abc-Prefill-0 (v1)</text>
<text x="704" y="141" text-anchor="middle" fill="#94a3b8" font-size="8">deleting</text>
<rect x="758" y="110" width="138" height="38" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
<text x="827" y="127" text-anchor="middle" fill="#16a34a" font-size="10" font-weight="500">def-Prefill-0 (v2)</text>
<text x="827" y="140" text-anchor="middle" fill="#16a34a" font-size="8">Ready (~5s load)</text>
<rect x="662" y="158" width="228" height="24" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
<text x="776" y="174" text-anchor="middle" fill="#16a34a" font-size="9" font-weight="500">Cache REUSED</text>

<!-- Node B -->
<rect x="650" y="225" width="260" height="130" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1.5"/>
<text x="662" y="245" fill="#1a1a2e" font-size="12" font-weight="500">Node B</text>
<rect x="662" y="255" width="85" height="38" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
<text x="704" y="275" text-anchor="middle" fill="#94a3b8" font-size="9">abc-Prefill-1 (v1)</text>
<text x="704" y="286" text-anchor="middle" fill="#94a3b8" font-size="8">deleting</text>
<rect x="758" y="255" width="138" height="38" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
<text x="827" y="272" text-anchor="middle" fill="#16a34a" font-size="10" font-weight="500">def-Prefill-1 (v2)</text>
<text x="827" y="285" text-anchor="middle" fill="#16a34a" font-size="8">Ready (~5s load)</text>
<rect x="662" y="303" width="228" height="24" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
<text x="776" y="319" text-anchor="middle" fill="#16a34a" font-size="9" font-weight="500">Cache REUSED</text>

<!-- Step 3 descriptions -->
<text x="780" y="372" text-anchor="middle" fill="#6b7280" font-size="10">New Pods land on these nodes.</text>
<text x="780" y="386" text-anchor="middle" fill="#6b7280" font-size="10">Weights loaded from cache in ~5s.</text>
<text x="780" y="400" text-anchor="middle" fill="#6b7280" font-size="10">Old Pods terminated. Upgrade done.</text>

<!-- Legend -->
<line x1="80" y1="410" x2="840" y2="410" stroke="#dee2e6" stroke-width="1"/>
<rect x="120" y="416" width="12" height="12" rx="2" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
<text x="136" y="426" fill="#6b7280" font-size="10">Old Pod (v1)</text>

<rect x="250" y="416" width="12" height="12" rx="2" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
<text x="266" y="426" fill="#6b7280" font-size="10">New Pod (v2, with affinity)</text>

<rect x="440" y="416" width="12" height="12" rx="2" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
<text x="456" y="426" fill="#6b7280" font-size="10">New Pod Ready (cache reused)</text>

<rect x="640" y="416" width="12" height="12" rx="2" fill="#dcfce7" stroke="#22c55e" stroke-width="1" stroke-dasharray="3,2"/>
<text x="656" y="426" fill="#6b7280" font-size="10">Node-local Cache</text>

</svg>
