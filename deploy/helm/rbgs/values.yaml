# Default values for rbgs-controller.

replicaCount: 2

image:
  repository: rolebasedgroup/rbgs-controller
  pullPolicy: IfNotPresent
  tag: v0.6.0-5390c07

imagePullSecrets: []

podAnnotations: {}

podSecurityContext: {}
# fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
# runAsNonRoot: true
# runAsUser: 1000

resources:
  limits:
    cpu: 1000m
    memory: 1536Mi
  requests:
    cpu: 100m
    memory: 256Mi

nodeSelector: {}

tolerations: []

# Webhook configuration for conversion webhook
webhook:
  enabled: true
  port: 9443
  # Certificate configuration
  # When certManager.enabled is false, you need to provide your own certificates
  certManager:
    enabled: false
  # Path to mount certificates (used when certManager is disabled)
  certPath: /tmp/k8s-webhook-server/serving-certs
  # Secret name containing TLS certificates
  certSecretName: rbgs-webhook-server-cert

crdUpgrade:
  enabled: true
  # This sets the time-to-live (TTL) for crd-upgrade jobs. Default is 259200 seconds (3 days).
  ttlSecondsAfterFinished: 259200
  repository: rolebasedgroup/rbgs-upgrade-crd
  tag: v0.6.0-5390c07
