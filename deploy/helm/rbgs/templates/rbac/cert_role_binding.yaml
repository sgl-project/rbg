apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rbgs-controller-secret-rolebinding
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: rbgs-controller-secret-role
subjects:
  - kind: ServiceAccount
    name: rbgs-controller-sa
    namespace: {{ .Release.Namespace }}
