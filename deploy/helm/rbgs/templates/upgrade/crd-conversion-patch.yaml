{{- /*
Post-install/upgrade Job that patches the conversion webhook clientConfig on the
RoleBasedGroup and RoleBasedGroupSet CRDs so they point to the correct Service
namespace for this Helm release.

Kustomize handles the same substitution via config/crd/kustomizeconfig.yaml.
This Job is the Helm-equivalent: it runs `kubectl patch` after CRD installation.
*/ -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: rbgs-crd-conversion-patch
  namespace: {{ .Release.Namespace }}
  labels:
    control-plane: rbgs-controller
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
spec:
  ttlSecondsAfterFinished: 120
  template:
    spec:
      serviceAccountName: rbgs-controller-sa
      restartPolicy: OnFailure
      containers:
        - name: patch-crd
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              set -e
              NAMESPACE="{{ .Release.Namespace }}"
              SERVICE="rbgs-webhook-service"
              PATCH=$(cat <<EOF
              {"spec":{"conversion":{"webhook":{"clientConfig":{"service":{"namespace":"${NAMESPACE}","name":"${SERVICE}"}}}}}}
              EOF
              )
              kubectl patch crd rolebasedgroups.workloads.x-k8s.io --type=merge -p "${PATCH}"
              kubectl patch crd rolebasedgroupsets.workloads.x-k8s.io --type=merge -p "${PATCH}"
