  - rolebasedgroupscalingadapters/status
  - rolebasedgroupsets/status
  - roleinstances/status
  - roleinstancesets/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - workloads.x-k8s.io
  resources:
  - coordinatedpolicies
  - instances
  - instancesets
  - rolebasedgroups
  - rolebasedgroupscalingadapters
  - rolebasedgroupsets
  - roleinstances
  - roleinstancesets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - workloads.x-k8s.io
  resources:
  - instancesets/finalizers
  - rolebasedgroups/finalizers
  - rolebasedgroupsets/finalizers
  - roleinstances/finalizers
  - roleinstancesets/finalizers
  verbs:
  - update
