  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - leaderworkerset.x-k8s.io
  resources:
  - leaderworkersets/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - scheduling.volcano.sh
  - scheduling.x-k8s.io
  resources:
  - podgroups
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - workloads.x-k8s.io
  resources:
  - clusterengineruntimeprofiles
  verbs:
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - workloads.x-k8s.io
  resources:
  - clusterengineruntimeprofiles/status
  - coordinatedpolicies/status
  - instances/status
  - instancesets/status
