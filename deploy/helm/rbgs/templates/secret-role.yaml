---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rbgs-controller-secret-role
  namespace: {{ .Release.Namespace }}
rules:
# Allow creating the webhook cert secret if it does not yet exist.
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - create
# Allow reading and updating only the specific webhook cert secret.
- apiGroups:
  - ""
  resources:
  - secrets
  resourceNames:
  - rbgs-webhook-cert
  verbs:
  - get
  - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rbgs-controller-secret-rolebinding
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: rbgs-controller-secret-role
subjects:
  - kind: ServiceAccount
    name: rbgs-controller-sa
    namespace: {{ .Release.Namespace }}
