# Example: Aggregated LLM Inference with SGLang and RoleBasedGroup (v1alpha2)
# This example demonstrates a complete aggregated deployment
# using SGLang runtime with Qwen 0.6B model.
#
# Architecture:
#   - backend: SGLang backend engine for both prefill and decode (GPU-accelerated)
#
# Model: Qwen/Qwen3-0.6B (lightweight model suitable for testing)
#
# Features demonstrated:
#   - standalonePattern for independent pod-per-instance deployment
#   - scalingAdapter for HPA integration
#   - rolloutStrategy with InPlaceIfPossible
#
# Note: When scalingAdapter is enabled in a role, the corresponding
# RoleBasedGroupScalingAdapter CR will be automatically created by the
# controller. Its lifecycle is bound to the RoleBasedGroup, so you can
# directly use it for HPA without manually creating it.
#
# Prerequisites:
#   - SGLang docker image: lmsysorg/sglang:v0.5.9-cu124 (or later)
#   - GPU nodes with CUDA support
#   - Model weights mounted at /models or use HuggingFace download

---
apiVersion: workloads.x-k8s.io/v1alpha2
kind: RoleBasedGroup
metadata:
  name: sglang-agg-inference
  namespace: default
  labels:
    app: sglang-inference
    deployment-type: aggregated
    model: qwen-0.6b
spec:
  roles:
    # Backend: SGLang engine for both prefill and decode
    - name: backend
      replicas: 1
      restartPolicy: RecreateRoleInstanceOnPodRestart
      scalingAdapter:
        enable: true
      rolloutStrategy:
        type: RollingUpdate
        rollingUpdate:
          type: InPlaceIfPossible
          maxUnavailable: 1
          inPlaceUpdateStrategy:
            gracePeriodSeconds: 30
      standalonePattern:
        template:
          metadata:
            labels:
              app: sglang-inference
              role: backend
          spec:
            containers:
              - name: backend
                image: lmsysorg/sglang:v0.5.9-cu124
                command:
                  - python3
                  - -m
                  - sglang.launch_server
                  - --model-path
                  - "Qwen/Qwen3-0.6B"
                  - --host
                  - "0.0.0.0"
                  - --port
                  - "8001"
                  - --tp-size
                  - "1"
                ports:
                  - name: grpc
                    containerPort: 8001
                  - name: metrics
                    containerPort: 9090
                resources:
                  requests:
                    cpu: "4"
                    memory: "8Gi"
                    nvidia.com/gpu: "1"
                  limits:
                    cpu: "8"
                    memory: "16Gi"
                    nvidia.com/gpu: "1"
                readinessProbe:
                  httpGet:
                    path: /health
                    port: 8001
                  initialDelaySeconds: 60
                  periodSeconds: 10
                livenessProbe:
                  httpGet:
                    path: /health
                    port: 8001
                  initialDelaySeconds: 120
                  periodSeconds: 30
