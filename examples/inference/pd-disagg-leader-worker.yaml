# Example: PD-Disaggregated with LeaderWorker pattern (v1alpha2)
# Uses leaderWorkerPattern for tensor-parallel inference where each instance
# requires multiple GPUs (1 leader + N workers per instance).
#
# Architecture:
#   - prefill: 2 instances, each with 1 leader + 3 workers (8x GPU total)
#   - decode: 4 instances, each with 1 leader + 1 worker (8x GPU total)
---
apiVersion: workloads.x-k8s.io/v1alpha2
kind: RoleBasedGroup
metadata:
  name: pd-disagg-lws
  namespace: default
  labels:
    app: llm-inference-tp
    deployment-type: pd-disaggregated-tensor-parallel
spec:
  roleTemplates:
    - name: inference-base
      template:
        metadata:
          labels:
            app: llm-inference-tp
        spec:
          containers:
            - name: vllm
              image: anolis-registry.cn-zhangjiakou.cr.aliyuncs.com/openanolis/nginx:1.14.1-8.6
              ports:
                - name: http
                  containerPort: 8080
              resources:
                requests:
                  nvidia.com/gpu: "1"
                limits:
                  nvidia.com/gpu: "1"

  roles:
    # Prefill: 2 instances, tensor parallel size = 4 (1 leader + 3 workers)
    - name: prefill
      replicas: 2
      restartPolicy: RecreateRoleInstanceOnPodRestart
      rolloutStrategy:
        type: RollingUpdate
        rollingUpdate:
          type: InPlaceIfPossible
          maxUnavailable: 1
      leaderWorkerPattern:
        size: 4   # 1 leader + 3 workers per instance
        templateRef:
          name: inference-base
        leaderTemplatePatch:
          metadata:
            labels:
              role: leader
          spec:
            containers:
              - name: vllm
                env:
                  - name: ROLE
                    value: leader
                  - name: TENSOR_PARALLEL_SIZE
                    value: "4"
        workerTemplatePatch:
          metadata:
            labels:
              role: worker
          spec:
            containers:
              - name: vllm
                env:
                  - name: ROLE
                    value: worker

    # Decode: 4 instances, tensor parallel size = 2 (1 leader + 1 worker)
    - name: decode
      replicas: 4
      dependencies: ["prefill"]
      restartPolicy: RecreateRoleInstanceOnPodRestart
      rolloutStrategy:
        type: RollingUpdate
        rollingUpdate:
          type: InPlaceIfPossible
          maxUnavailable: 1
      leaderWorkerPattern:
        size: 2   # 1 leader + 1 worker per instance
        templateRef:
          name: inference-base
        leaderTemplatePatch:
          metadata:
            labels:
              role: leader
          spec:
            containers:
              - name: vllm
                env:
                  - name: ROLE
                    value: leader
                  - name: TENSOR_PARALLEL_SIZE
                    value: "2"
        workerTemplatePatch:
          metadata:
            labels:
              role: worker
          spec:
            containers:
              - name: vllm
                env:
                  - name: ROLE
                    value: worker
