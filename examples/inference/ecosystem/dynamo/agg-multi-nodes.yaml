# Example: Aggregated with LeaderWorker pattern (v1alpha2) - NVIDIA Dynamo SGLang Runtime
# Uses leaderWorkerPattern for tensor-parallel inference where each instance
# requires multiple GPUs (1 leader + N workers per instance).
#
# Architecture:
#   - processor: Dynamo frontend for request routing and HTTP API
#   - backend: 1 instance with 1 leader + 1 worker (2x GPU, tp-size=2)
#
# Model: Qwen/Qwen3-0.6B (lightweight model suitable for testing)
#
# Features demonstrated:
#   - LeaderWorkerPattern for distributed inference deployment
#   - RoleTemplates for reducing configuration duplication
#   - NVIDIA Dynamo SGLang runtime with distributed coordination
#   - rolloutStrategy with InPlaceIfPossible
#   - Multi-node tensor parallel via --dist-init-addr, --nnodes, --node-rank
#
# Prerequisites:
#   - NVIDIA Dynamo SGLang runtime image: nvcr.io/nvidia/ai-dynamo/sglang-runtime:1.0.1
#   - GPU nodes with CUDA support
#   - ETCD and NATS services deployed (required for Dynamo runtime)
#   - Model weights mounted at /models or use HuggingFace download
#   - (Optional) Model Express server for accelerated model distribution.
#     Model Express (https://github.com/ai-dynamo/modelexpress) is a standalone
#     service that coordinates P2P model weight transfers across nodes.
#     Deploy MX Server via one of:
#       1. Dynamo Helm chart: --set "global.model-express.enabled=true"
#       2. Manual: docker run -d --name redis -p 6379:6379 redis:8-alpine
#                  MX_METADATA_BACKEND=redis cargo run --bin modelexpress-server
#     Then set MODEL_EXPRESS_URL below to the MX gRPC endpoint.
#     If not deployed, workers fall back to direct HuggingFace download.

---
apiVersion: workloads.x-k8s.io/v1alpha2
kind: RoleBasedGroup
metadata:
  name: dynamo-agg-multi-nodes-inference
  labels:
    app: dynamo-llm-inference
    deployment-type: aggregated-tensor-parallel
    model: qwen-0.6b
    runtime: dynamo-sglang
spec:
  # Define reusable templates shared by multiple roles
  roleTemplates:
    - name: dynamo-base
      template:
        metadata:
          labels:
            app: dynamo-llm-inference
        spec:
          containers:
            - name: sglang
              image: nvcr.io/nvidia/ai-dynamo/sglang-runtime:1.0.1
              env:
                - name: DYN_NAMESPACE
                  value: default
                - name: DYNAMO_NAMESPACE
                  value: default
                - name: ETCD_ENDPOINTS
                  value: http://etcd:2379
                - name: NATS_SERVER
                  value: nats://nats:4222
                # Model Express (https://github.com/ai-dynamo/modelexpress):
                # Accelerated model distribution via gRPC. Workers download model
                # weights through the MX Server, which coordinates P2P transfers
                # (GPU-to-GPU via NIXL RDMA) across nodes.
                # Falls back to direct HuggingFace download if MX Server is unavailable.
                # To disable, remove or leave empty.
                - name: MODEL_EXPRESS_URL
                  value: model-express-server:8001

  roles:
    # Processor: Dynamo frontend for request routing and HTTP API
    - name: processor
      replicas: 1
      standalonePattern:
        templateRef:
          name: dynamo-base
          patch:
            spec:
              containers:
                - name: sglang
                  command:
                    - python3
                    - -m
                    - dynamo.frontend
                  args:
                    - --http-port
                    - "8000"
                  ports:
                    - name: http
                      containerPort: 8000
                    - name: metrics
                      containerPort: 9090
                  readinessProbe:
                    httpGet:
                      path: /health
                      port: 8000
                    initialDelaySeconds: 60
                    periodSeconds: 10
                  livenessProbe:
                    httpGet:
                      path: /health
                      port: 8000
                    initialDelaySeconds: 120
                    periodSeconds: 30
                  resources:
                    requests:
                      cpu: "2"
                      memory: "8Gi"
                    limits:
                      cpu: "4"
                      memory: "16Gi"

    # Backend: 1 instance, tensor parallel size = 2 (1 leader + 1 worker)
    - name: backend
      replicas: 1
      scalingAdapter:
        enable: true
      rolloutStrategy:
        type: RollingUpdate
        rollingUpdate:
          type: InPlaceIfPossible
          maxUnavailable: 1
      leaderWorkerPattern:
        size: 2   # 1 leader + 1 worker per instance
        restartPolicy:
          type: None
        templateRef:
          name: dynamo-base
          patch:
            spec:
              volumes:
                - name: dshm
                  emptyDir:
                    medium: Memory
                    sizeLimit: 30Gi
              containers:
                - name: sglang
                  command:
                    - python3
                    - -m
                    - dynamo.sglang
                  args:
                    - --model-path
                    - Qwen/Qwen3-0.6B
                    - --served-model-name
                    - qwen3
                    - --tp-size
                    - "2"
                    - --trust-remote-code
                    - --host
                    - 0.0.0.0
                    - --dist-init-addr
                    - $(RBG_LWP_LEADER_ADDRESS):6379
                    - --nnodes
                    - $(RBG_LWP_GROUP_SIZE)
                    - --node-rank
                    - $(RBG_LWP_WORKER_INDEX)
                  resources:
                    requests:
                      cpu: "4"
                      memory: "16Gi"
                      nvidia.com/gpu: "1"
                    limits:
                      cpu: "8"
                      memory: "32Gi"
                      nvidia.com/gpu: "1"
                  volumeMounts:
                    - name: dshm
                      mountPath: /dev/shm
---
apiVersion: v1
kind: Service
metadata:
  name: dynamo-agg-multi-nodes-service
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8000
      protocol: TCP
      targetPort: 8000
  selector:
    rolebasedgroup.workloads.x-k8s.io/name: dynamo-agg-multi-nodes-inference
    rolebasedgroup.workloads.x-k8s.io/role: processor
