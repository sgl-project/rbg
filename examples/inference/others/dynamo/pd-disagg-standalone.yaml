# Example: PD-Disaggregated LLM Inference with NVIDIA Dynamo SGLang Runtime (v1alpha2)
# This example demonstrates a complete Prefill-Decode disaggregated deployment
# using NVIDIA Dynamo SGLang runtime with Qwen 0.6B model.
#
# Architecture:
#   - processor: Dynamo frontend for request routing and HTTP API
#   - prefill: SGLang prefill engine for prompt encoding (GPU-accelerated)
#   - decode: SGLang decode engine for token generation (GPU-accelerated)
#
# Model: Qwen/Qwen3-0.6B (lightweight model suitable for testing PD disaggregation)
#
# Features demonstrated:
#   - NVIDIA Dynamo SGLang runtime with PD disaggregation
#   - standalonePattern for independent pod-per-instance deployment
#   - RoleTemplates for reducing configuration duplication
#   - scalingAdapter for HPA integration
#   - rolloutStrategy with InPlaceIfPossible
#
# Note: When scalingAdapter is enabled in a role, the corresponding
# RoleBasedGroupScalingAdapter CR will be automatically created by the
# controller. Its lifecycle is bound to the RoleBasedGroup, so you can
# directly use it for HPA without manually creating it.
#
# Prerequisites:
#   - NVIDIA Dynamo SGLang runtime image: nvcr.io/nvidia/ai-dynamo/sglang-runtime:1.0.1
#   - GPU nodes with CUDA support
#   - ETCD and NATS services deployed (required for Dynamo runtime)
#   - Model weights mounted at /models or use HuggingFace download

---
apiVersion: workloads.x-k8s.io/v1alpha2
kind: RoleBasedGroup
metadata:
  name: dynamo-pd-inference
  labels:
    app: dynamo-sglang-inference
    deployment-type: pd-disaggregated
    model: qwen-0.6b
    runtime: dynamo-sglang
spec:
  # Define reusable templates shared by multiple roles
  roleTemplates:
    - name: dynamo-base
      template:
        metadata:
          labels:
            app: dynamo-sglang-inference
        spec:
          containers:
            - name: sglang
              image: nvcr.io/nvidia/ai-dynamo/sglang-runtime:1.0.1
              env:
                - name: DYNAMO_PORT
                  value: "8000"
                - name: DYNAMO_NAME
                  value: dynamo-pd-inference
                - name: DYNAMO_NAMESPACE
                  value: default
                - name: ETCD_ENDPOINTS
                  value: http://etcd:2379
                - name: NATS_SERVER
                  value: nats://nats:4222
                - name: DYNAMO_RP_TIMEOUT
                  value: "60"
              ports:
                - name: grpc
                  containerPort: 8000
                - name: metrics
                  containerPort: 9090
              readinessProbe:
                httpGet:
                  path: /health
                  port: 8000
                initialDelaySeconds: 60
                periodSeconds: 10
              livenessProbe:
                httpGet:
                  path: /health
                  port: 8000
                initialDelaySeconds: 120
                periodSeconds: 30

  roles:
    # Processor: Dynamo frontend for request routing and HTTP API
    - name: processor
      replicas: 1
      standalonePattern:
        templateRef:
          name: dynamo-base
          patch:
            spec:
              containers:
                - name: sglang
                  command:
                    - sh
                    - -c
                    - python -m dynamo.frontend --http-port 8000
                  ports:
                    - name: http
                      containerPort: 8000
                    - name: metrics
                      containerPort: 9090
                  resources:
                    requests:
                      cpu: "2"
                      memory: "8Gi"
                    limits:
                      cpu: "4"
                      memory: "16Gi"

    # Prefill: SGLang prefill engine for prompt encoding
    # Uses --disaggregation-mode=prefill for PD disaggregation
    - name: prefill
      replicas: 1
      restartPolicy: RecreateRoleInstanceOnPodRestart
      rolloutStrategy:
        type: RollingUpdate
        rollingUpdate:
          type: InPlaceIfPossible
          maxUnavailable: 1
          inPlaceUpdateStrategy:
            gracePeriodSeconds: 30
      standalonePattern:
        templateRef:
          name: dynamo-base
          patch:
            spec:
              volumes:
                - name: dshm
                  emptyDir:
                    medium: Memory
                    sizeLimit: 30Gi
              containers:
                - name: sglang
                  command:
                    - sh
                    - -c
                    - |-
                      python3 -m dynamo.sglang --model Qwen/Qwen3-0.6B --served-model-name qwen3
                      --tp-size 1 --skip-tokenizer-init --disaggregation-mode prefill --disaggregation-transfer-backend nixl
                  resources:
                    requests:
                      cpu: "4"
                      memory: "16Gi"
                      nvidia.com/gpu: "1"
                    limits:
                      cpu: "8"
                      memory: "32Gi"
                      nvidia.com/gpu: "1"
                  volumeMounts:
                    - name: dshm
                      mountPath: /dev/shm

    # Decode: SGLang decode engine for token generation
    # Uses --disaggregation-mode=decode for PD disaggregation
    - name: decode
      replicas: 1
      restartPolicy: RecreateRoleInstanceOnPodRestart
      standalonePattern:
        templateRef:
          name: dynamo-base
          patch:
            spec:
              volumes:
                - name: dshm
                  emptyDir:
                    medium: Memory
                    sizeLimit: 30Gi
              containers:
                - name: sglang
                  command:
                    - sh
                    - -c
                    - |-
                      python3 -m dynamo.sglang --model Qwen/Qwen3-0.6B --served-model-name qwen3
                      --tp-size 1 --skip-tokenizer-init --disaggregation-mode decode --disaggregation-transfer-backend nixl
                  resources:
                    requests:
                      cpu: "4"
                      memory: "16Gi"
                      nvidia.com/gpu: "1"
                    limits:
                      cpu: "8"
                      memory: "32Gi"
                      nvidia.com/gpu: "1"
                  volumeMounts:
                    - name: dshm
                      mountPath: /dev/shm
