# Example: Basic RoleBasedGroup with two roles
# This example demonstrates the fundamental usage of RoleBasedGroup v1alpha2.
# Each role uses standalonePattern for single-pod-per-instance deployment.
apiVersion: workloads.x-k8s.io/v1alpha2
kind: RoleBasedGroup
metadata:
  name: nginx-cluster
  namespace: default
spec:
  roles:
    - name: frontend
      replicas: 1
      standalonePattern:
        template:
          spec:
            containers:
              - name: nginx-frontend
                image: anolis-registry.cn-zhangjiakou.cr.aliyuncs.com/openanolis/nginx:1.14.1-8.6
                ports:
                  - containerPort: 80

    - name: backend
      replicas: 3
      dependencies: ["frontend"] # backend roles are created only after the frontend role is ready
      standalonePattern:
        template:
          spec:
            containers:
              - name: nginx-backend
                image: anolis-registry.cn-zhangjiakou.cr.aliyuncs.com/openanolis/nginx:1.14.1-8.6
                ports:
                  - containerPort: 8080
