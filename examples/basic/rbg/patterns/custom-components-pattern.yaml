# Example: CustomComponentsPattern - heterogeneous pod groups (v1alpha2)
# customComponentsPattern creates instances with multiple different types of pods
# (components), each component can have a different size and template.
# Use this for workloads requiring heterogeneous pod groups, e.g. disaggregated inference.
#
# Component annotation rbg.workloads.x-k8s.io/component-no-trigger-restart:
# When set to "true" on a component's pod template, this component's pod restart/delete
# events will NOT trigger the role's restart policy (RecreateRoleInstanceOnPodRestart or
# RecreateRBGOnPodRestart). This is useful for auxiliary components (e.g., monitoring,
# logging sidecars) whose failures should not affect the main workload.
apiVersion: workloads.x-k8s.io/v1alpha2
kind: RoleBasedGroup
metadata:
  name: custom-components-demo
  namespace: default
spec:
  roles:
    - name: engine
      replicas: 3
      restartPolicy: RecreateRoleInstanceOnPodRestart
      rolloutStrategy:
        type: RollingUpdate
        rollingUpdate:
          type: InPlaceIfPossible
      # customComponentsPattern: define heterogeneous components per instance
      customComponentsPattern:
        components:
          - name: custom-component-1
            size: 1
            template:
              spec:
                containers:
                  - name: worker
                    image: anolis-registry.cn-zhangjiakou.cr.aliyuncs.com/openanolis/nginx:1.14.1-8.6
                    ports:
                      - containerPort: 8080
                    resources:
                      requests:
                        cpu: "2"
                        memory: "4Gi"
          - name: custom-component-2
            size: 2
            template:
              spec:
                containers:
                  - name: worker
                    image: anolis-registry.cn-zhangjiakou.cr.aliyuncs.com/openanolis/nginx:1.14.1-8.6
                    ports:
                      - containerPort: 8081
                    resources:
                      requests:
                        cpu: "4"
                        memory: "8Gi"
          # This monitoring component's pod events will NOT trigger the role's restart policy
          # When this pod restarts or is deleted, the role/RBG will NOT be recreated
          - name: monitoring-sidecar
            size: 1
            template:
              metadata:
                annotations:
                  # This annotation prevents this component from triggering restart policy
                  rbg.workloads.x-k8s.io/component-no-trigger-restart: "true"
              spec:
                containers:
                  - name: monitor
                    image: anolis-registry.cn-zhangjiakou.cr.aliyuncs.com/openanolis/nginx:1.14.1-8.6
                    ports:
                      - containerPort: 9090