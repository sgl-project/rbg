# Example: LeaderWorkerPattern - multi-pod pattern with leader and workers (v1alpha2)
# leaderWorkerPattern creates grouped instances where each instance has one leader
# and multiple workers. Use this for LLM inference with tensor parallelism.
apiVersion: workloads.x-k8s.io/v1alpha2
kind: RoleBasedGroup
metadata:
  name: lws-pattern-demo
  namespace: default
spec:
  roles:
    - name: prefill
      replicas: 2
      # leaderWorkerPattern: each replica creates 1 leader + (size-1) workers
      leaderWorkerPattern:
        size: 4    # total pods per instance: 1 leader + 3 workers
        template:
          metadata:
            labels:
              app: inference
          spec:
            containers:
              - name: nginx
                image: anolis-registry.cn-zhangjiakou.cr.aliyuncs.com/openanolis/nginx:1.14.1-8.6
                ports:
                  - name: http
                    containerPort: 8080
        # Patch applied only to the leader pod
        leaderTemplatePatch:
          metadata:
            labels:
              role: leader
          spec:
            containers:
              - name: nginx
                env:
                  - name: ROLE
                    value: leader
        # Patch applied only to worker pods
        workerTemplatePatch:
          metadata:
            labels:
              role: worker
          spec:
            containers:
              - name: nginx
                env:
                  - name: ROLE
                    value: worker

    # Role using templateRef with leaderWorkerPattern
    - name: decode
      replicas: 2
      dependencies: ["prefill"]
      leaderWorkerPattern:
        size: 2
        templateRef:
          name: base-template
      
  roleTemplates:
    - name: base-template
      template:
        spec:
          containers:
            - name: nginx
              image: anolis-registry.cn-zhangjiakou.cr.aliyuncs.com/openanolis/nginx:1.14.1-8.6
              ports:
                - containerPort: 8080
