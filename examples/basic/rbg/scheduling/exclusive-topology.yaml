# Example: RoleBasedGroup with exclusive topology (v1alpha2)
# Pods of different roles are scheduled on different nodes (or topology zones)
# by setting the exclusive-topology annotation.
apiVersion: workloads.x-k8s.io/v1alpha2
kind: RoleBasedGroup
metadata:
  name: nginx-exclusive
  namespace: default
  annotations:
    rolebasedgroup.workloads.x-k8s.io/exclusive-topology: "kubernetes.io/hostname"
spec:
  roles:
    - name: frontend
      replicas: 1
      standalonePattern:
        template:
          # To disable exclusive topology for this specific role, add:
          metadata:
            annotations:
              rolebasedgroup.workloads.x-k8s.io/disable-exclusive-topology: "true"
          spec:
            containers:
              - name: nginx-frontend
                image: anolis-registry.cn-zhangjiakou.cr.aliyuncs.com/openanolis/nginx:1.14.1-8.6
                ports:
                  - containerPort: 80

    - name: backend
      replicas: 1
      standalonePattern:
        template:
          spec:
            containers:
              - name: nginx-backend
                image: anolis-registry.cn-zhangjiakou.cr.aliyuncs.com/openanolis/nginx:1.14.1-8.6
                ports:
                  - containerPort: 8080
