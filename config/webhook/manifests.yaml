---
# Admission webhook configurations for the RoleBasedGroup admission webhooks.
#
# Service name and namespace below are Kustomize placeholders:
#   - namespace: system        → replaced with the Kustomize `namespace:` value
#                                (e.g. rbgs-system) by the namespace transformer.
#   - name: webhook-service    → prefixed with `namePrefix:` (e.g. rbgs-webhook-service)
#                                via the built-in nameReference transformer.
# Do NOT apply this file directly; always render with `kustomize build config/default`.
#
# caBundle is intentionally left empty. The in-cluster controller
# (WebhookCertReconciler) patches it at runtime using the self-signed CA generated
# by pkg/webhook.CertManager.
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- name: vrolebasedgroup.kb.io
  admissionReviewVersions:
  - v1
  sideEffects: None
  failurePolicy: Fail
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-workloads-x-k8s-io-v1alpha2-rolebasedgroup
  rules:
  - apiGroups:
    - workloads.x-k8s.io
    apiVersions:
    - v1alpha2
    operations:
    - CREATE
    - UPDATE
    resources:
    - rolebasedgroups
