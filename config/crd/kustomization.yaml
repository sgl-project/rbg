# This kustomization.yaml is not intended to be run by itself,
# since it depends on service name and namespace that are out of this kustomize package.
# It should be run by config/default
resources:
- bases/workloads.x-k8s.io_rolebasedgroups.yaml
- bases/workloads.x-k8s.io_rolebasedgroupsets.yaml
- bases/workloads.x-k8s.io_clusterengineruntimeprofiles.yaml
- bases/workloads.x-k8s.io_rolebasedgroupscalingadapters.yaml
- bases/workloads.x-k8s.io_roleinstances.yaml
- bases/workloads.x-k8s.io_roleinstancesets.yaml
- bases/workloads.x-k8s.io_coordinatedpolicies.yaml
# +kubebuilder:scaffold:crdkustomizeresource

patches:
# [WEBHOOK] Conversion webhook patches for RoleBasedGroup and RoleBasedGroupSet.
# Uncomment the following lines to enable conversion webhook on the CRDs.
- path: patches/webhook_in_rolebasedgroups.yaml
  target:
    group: apiextensions.k8s.io
    version: v1
    kind: CustomResourceDefinition
    name: rolebasedgroups.workloads.x-k8s.io
- path: patches/webhook_in_rolebasedgroupsets.yaml
  target:
    group: apiextensions.k8s.io
    version: v1
    kind: CustomResourceDefinition
    name: rolebasedgroupsets.workloads.x-k8s.io
# +kubebuilder:scaffold:crdkustomizewebhookpatch

# [WEBHOOK] To enable webhook, uncomment the following section
# the following config is for teaching kustomize how to do kustomization for CRDs.
configurations:
- kustomizeconfig.yaml
