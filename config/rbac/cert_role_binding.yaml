---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: controller-secret-rolebinding
  namespace: system
  labels:
    app.kubernetes.io/name: rbgs
    app.kubernetes.io/managed-by: kustomize
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: controller-secret-role
subjects:
  - kind: ServiceAccount
    name: controller-sa
    namespace: system
